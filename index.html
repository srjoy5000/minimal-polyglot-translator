<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal Polyglot Dictionary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Tooltip animation and styling */
      #dict-tooltip {
        transition:
          opacity 0.2s ease-in-out,
          transform 0.2s ease-in-out;
        transform: translateY(10px);
        opacity: 0;
        pointer-events: none;
      }
      #dict-tooltip.visible {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }
      /* Custom scrollbar for the text area */
      textarea::-webkit-scrollbar {
        width: 8px;
      }
      textarea::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 4px;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center py-12 px-4 relative"
  >
    <div
      class="w-full max-w-3xl bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100"
    >
      <!-- Header & Controls -->
      <div class="bg-indigo-600 text-white p-6">
        <h1 class="text-2xl font-bold tracking-tight mb-4">Minimal Reader</h1>

        <div
          class="flex flex-col sm:flex-row gap-4 items-center bg-indigo-700/50 p-3 rounded-lg"
        >
          <div class="flex items-center gap-2 w-full sm:w-auto">
            <label class="text-sm font-medium text-indigo-100"
              >Reading in:</label
            >
            <select
              id="source-lang"
              class="bg-white text-gray-800 text-sm rounded-md px-2 py-1 outline-none border-none focus:ring-2 focus:ring-indigo-300 w-full sm:w-auto"
            >
              <option value="en">English</option>
              <option value="ja">Japanese</option>
              <option value="fr">French</option>
              <option value="pt">Portuguese (BR)</option>
            </select>
          </div>

          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 text-indigo-300 hidden sm:block"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M14 5l7 7m0 0l-7 7m7-7H3"
            />
          </svg>

          <div class="flex items-center gap-2 w-full sm:w-auto">
            <label class="text-sm font-medium text-indigo-100"
              >Translate to:</label
            >
            <select
              id="target-lang"
              class="bg-white text-gray-800 text-sm rounded-md px-2 py-1 outline-none border-none focus:ring-2 focus:ring-indigo-300 w-full sm:w-auto"
            >
              <option value="ja">Japanese</option>
              <option value="en">English</option>
              <option value="fr">French</option>
              <option value="pt" selected>Portuguese (BR)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Reading Area -->
      <div class="p-6">
        <p class="text-sm text-gray-500 mb-3 flex items-center gap-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
          Paste your text below. Highlight any word to see its minimal
          dictionary definition.
        </p>
        <!-- Using a contenteditable div makes text selection coordinates easier to manage than a textarea -->
        <div
          id="reader-area"
          contenteditable="true"
          class="w-full h-80 p-4 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-lg leading-relaxed resize-none overflow-y-auto"
          placeholder="Paste your text here..."
        >
          Type or paste your text here... Try selecting a word!
        </div>
      </div>
    </div>

    <!-- Floating Dictionary Tooltip -->
    <div
      id="dict-tooltip"
      class="absolute z-50 bg-white border border-gray-200 shadow-2xl rounded-lg p-4 max-w-[280px] w-max hidden"
    >
      <div
        id="tooltip-loading"
        class="text-gray-400 text-sm font-medium animate-pulse"
      >
        Looking up...
      </div>
      <div id="tooltip-content" class="hidden">
        <div
          class="flex items-baseline gap-2 mb-1 border-b border-gray-100 pb-2"
        >
          <span id="tt-word" class="font-bold text-gray-900 text-lg"></span>
          <span
            id="tt-pos"
            class="text-xs font-semibold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full uppercase tracking-wider"
          ></span>
        </div>
        <div class="mt-2">
          <div
            id="tt-translation"
            class="text-gray-800 text-base font-medium"
          ></div>
          <div id="tt-synonyms" class="text-gray-500 text-sm mt-1 italic"></div>
        </div>
      </div>
    </div>

    <script>
      const readerArea = document.getElementById("reader-area");
      const tooltip = document.getElementById("dict-tooltip");
      const tooltipLoading = document.getElementById("tooltip-loading");
      const tooltipContent = document.getElementById("tooltip-content");

      // UI Elements
      const elWord = document.getElementById("tt-word");
      const elPos = document.getElementById("tt-pos");
      const elTrans = document.getElementById("tt-translation");
      const elSyn = document.getElementById("tt-synonyms");
      const srcSelect = document.getElementById("source-lang");
      const tgtSelect = document.getElementById("target-lang");

      // Prevent selecting the same language in both dropdowns
      function updateLanguageOptions() {
        for (let option of tgtSelect.options) {
          option.disabled = option.value === srcSelect.value;
        }
        for (let option of srcSelect.options) {
          option.disabled = option.value === tgtSelect.value;
        }
      }

      srcSelect.addEventListener("change", updateLanguageOptions);
      tgtSelect.addEventListener("change", updateLanguageOptions);

      // Initialize disabled options on load
      updateLanguageOptions();

      // Prevent tooltip from disappearing when clicking inside it
      tooltip.addEventListener("mousedown", (e) => e.stopPropagation());

      // Hide tooltip on outside click or when typing starts
      document.addEventListener("mousedown", (e) => {
        if (e.target !== readerArea && !tooltip.contains(e.target)) {
          hideTooltip();
        }
      });

      readerArea.addEventListener("input", hideTooltip);

      // Capture selected text
      readerArea.addEventListener("mouseup", async (e) => {
        // Short delay to allow double-click selection to register fully in the browser
        setTimeout(() => handleSelection(e), 50);
      });

      async function handleSelection(mouseEvent) {
        const selection = window.getSelection();
        const text = selection.toString().trim();

        // Validate selection (avoid empty, sentences, or huge chunks)
        if (
          !text ||
          text.length === 0 ||
          text.includes("\n") ||
          text.length > 30
        ) {
          hideTooltip();
          return;
        }

        // Position tooltip based on mouse coordinates for immediate feedback
        positionTooltip(mouseEvent.pageX, mouseEvent.pageY);
        showLoading();

        const srcLang = srcSelect.value;
        const tgtLang = tgtSelect.value;

        try {
          const data = await fetchMinimalDictionary(text, srcLang, tgtLang);
          if (data) {
            renderTooltip(data);
          } else {
            renderError("Definition not found.");
          }
        } catch (error) {
          console.error(error);
          renderError("Network error.");
        }
      }

      // The "Rule of One" Data Strategy - Fetch & Parse
      async function fetchMinimalDictionary(word, src, tgt) {
        // Using a free, keyless endpoint that provides cross-language dictionary data
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src}&tl=${tgt}&dt=t&dt=bd&q=${encodeURIComponent(word)}`;

        const response = await fetch(url);
        const data = await response.json();

        if (!data || !data[0]) return null;

        const primaryTranslation = data[0][0][0];
        let partOfSpeech = "";
        let synonyms = "";

        // Check if extended dictionary/part-of-speech data exists (data[1] holds dictionary definitions)
        if (data[1] && data[1][0]) {
          partOfSpeech = data[1][0][0]; // e.g., 'noun', 'verb'

          // Grab only the top 2 alternative meanings for minimal display
          if (data[1][0][1]) {
            synonyms = data[1][0][1].slice(0, 2).join(", ");
          }
        }

        return {
          original: word,
          translation: primaryTranslation,
          pos: partOfSpeech ? partOfSpeech.substring(0, 4) + "." : "", // Abbreviate POS (noun -> noun.)
          synonyms: synonyms === primaryTranslation ? "" : synonyms, // Avoid duplicate display
        };
      }

      // --- UI Helper Functions ---

      function positionTooltip(x, y) {
        // Offset slightly so cursor doesn't cover the box
        tooltip.style.left = `${x + 10}px`;
        tooltip.style.top = `${y + 15}px`;

        // Basic collision detection to prevent going off-screen
        tooltip.classList.remove("hidden");
        const rect = tooltip.getBoundingClientRect();

        if (rect.right > window.innerWidth) {
          tooltip.style.left = `${window.innerWidth - rect.width - 20}px`;
        }
        if (rect.bottom > window.innerHeight) {
          tooltip.style.top = `${y - rect.height - 15}px`;
        }
      }

      function showLoading() {
        tooltip.classList.add("visible");
        tooltipLoading.classList.remove("hidden");
        tooltipContent.classList.add("hidden");
      }

      function hideTooltip() {
        tooltip.classList.remove("visible");
        setTimeout(() => {
          if (!tooltip.classList.contains("visible")) {
            tooltip.classList.add("hidden");
          }
        }, 200); // Wait for transition
      }

      function renderTooltip(data) {
        tooltipLoading.classList.add("hidden");
        tooltipContent.classList.remove("hidden");

        elWord.textContent = data.original;

        if (data.pos) {
          elPos.textContent = data.pos;
          elPos.style.display = "inline-block";
        } else {
          elPos.style.display = "none";
        }

        elTrans.textContent = data.translation;

        if (data.synonyms) {
          elSyn.textContent = `Also: ${data.synonyms}`;
          elSyn.style.display = "block";
        } else {
          elSyn.style.display = "none";
        }
      }

      function renderError(msg) {
        tooltipLoading.classList.add("hidden");
        tooltipContent.classList.remove("hidden");

        elWord.textContent = "Error";
        elPos.style.display = "none";
        elTrans.textContent = msg;
        elSyn.style.display = "none";
      }
    </script>
  </body>
</html>
